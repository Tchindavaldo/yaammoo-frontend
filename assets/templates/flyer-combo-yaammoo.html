<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>yaammoo - Combo Offer Flyer</title>
  <meta name="hz:slide-selector" content=".flyer" />
  <meta name="hz:canvas-width" content="794" />
  <meta name="hz:canvas-height" content="1123" />
  <link rel="stylesheet" href="https://use.typekit.net/txx5kiq.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #2a2e3a;
      font-family: "source-sans-3", sans-serif;
    }
    .flyer {
      position: relative;
      width: 794px;
      height: 1123px;
      background: radial-gradient(ellipse at top, #FF9433 0%, #F47B20 45%, #D9651A 100%);
      overflow: hidden;
      color: #fff;
    }

    /* Decorative subtle pattern - radial light */
    .flyer::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 70% 35%, rgba(255,255,255,0.10) 0%, transparent 45%);
      pointer-events: none;
    }

    /* === HEADER === */
    .header {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 20px 30px;
      z-index: 10;
    }
    .logo-bubble {
      background: #FFF5E0;
      border-radius: 0 0 60px 60px;
      padding: 14px 36px 20px 30px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
      margin-left: -10px;
      margin-top: -5px;
    }
    .logo-bubble img {
      display: block;
      width: 160px;
      height: auto;
    }
    .contact {
      text-align: right;
      color: #FFF5E0;
      font-family: "source-sans-3", sans-serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 1.4;
      display: flex; align-items: center; gap: 10px;
      padding-top: 14px;
    }
    .contact .phone-icon {
      width: 28px; height: 28px;
      border: 2px solid #FFF5E0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .contact .phone-icon svg { width: 14px; height: 14px; fill: #FFF5E0; }
    .contact .numbers { display: flex; flex-direction: column; }

    /* === TITLE BLOCK === */
    .title-block {
      position: absolute; top: 170px; left: 0; right: 0;
      text-align: center;
      z-index: 5;
    }
    .date-pill {
      display: inline-block;
      background: #D9651A;
      color: #FFD200;
      padding: 6px 24px;
      border-radius: 20px;
      font-family: "source-sans-3", sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
      transform: rotate(-4deg);
    }
    .display-title {
      font-family: "bebas-neue-v14-deprecated", sans-serif;
      font-size: 108px;
      line-height: 0.95;
      color: #FFD200;
      letter-spacing: 1px;
      text-shadow:
        0 5px 0 #B85518,
        0 8px 18px rgba(0,0,0,0.35);
      margin: 6px 0 8px;
      font-weight: 400;
    }
    .subtitle {
      font-family: "source-sans-3", sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #FFFFFF;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* === CONTENT ROW === */
    .content-row {
      position: absolute;
      top: 430px; left: 0; right: 0; bottom: 90px;
    }

    /* Combo items card (left) */
    .items-card {
      position: absolute;
      top: 60px;
      left: 30px;
      width: 280px;
      background: linear-gradient(180deg, #C44A0E 0%, #A33A06 100%);
      border: 3px solid #FFD200;
      border-radius: 20px;
      padding: 0;
      z-index: 4;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .items-header {
      background: #FFD200;
      color: #C44A0E;
      font-family: "source-sans-3", sans-serif;
      font-weight: 800;
      font-size: 20px;
      text-align: center;
      padding: 10px 0;
      border-radius: 16px 16px 0 0;
      margin: -1px;
    }
    .items-list {
      list-style: none;
      padding: 22px 28px 16px;
      color: #FFF5E0;
      font-family: "source-sans-3", sans-serif;
      font-weight: 600;
      font-size: 22px;
      line-height: 1.5;
    }
    .items-list li::before { content: "" ; }

    .price-tag {
      position: absolute;
      bottom: -22px; left: 50%;
      transform: translateX(-50%) rotate(-3deg);
      background: #FFD200;
      color: #C44A0E;
      font-family: "bebas-neue-v14-deprecated", sans-serif;
      font-size: 36px;
      padding: 10px 28px 6px;
      border-radius: 14px;
      letter-spacing: 1px;
      border: 3px solid #FFFFFF;
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
      white-space: nowrap;
    }

    /* Hero photo (right) */
    .hero-photo {
      position: absolute;
      top: 0; right: -40px;
      width: 460px; height: 460px;
      z-index: 3;
    }
    .hero-photo img {
      width: 100%; height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
    }

    /* Plate base ellipse */
    .plate {
      position: absolute;
      bottom: 100px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 60px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.35) 0%, transparent 70%);
      z-index: 2;
    }

    /* === FOOTER === */
    .footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 30px;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      color: #FFF5E0;
      font-family: "source-sans-3", sans-serif;
      font-weight: 600;
      font-size: 16px;
      z-index: 10;
    }
    .footer .pin-icon {
      width: 22px; height: 22px;
      fill: #FFF5E0;
      flex-shrink: 0;
    }
    .footer strong { font-weight: 800; }
  </style>
</head>
