<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec4913",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221510",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display antialiased">
    <!-- Main Background (Dimmed Food App Screen) -->
    <div class="relative h-screen w-full overflow-hidden bg-slate-200">
        <!-- Background Mockup Content -->
        <div class="p-4 space-y-6 opacity-40 grayscale">
            <div class="flex items-center justify-between">
                <span class="material-symbols-outlined text-slate-900">arrow_back</span>
                <span class="material-symbols-outlined text-slate-900">share</span>
            </div>
            <div class="w-full h-48 bg-slate-300 rounded-xl" data-alt="Gourmet burger with melting cheese and fries">
            </div>
            <div class="space-y-2">
                <div class="h-6 w-3/4 bg-slate-300 rounded"></div>
                <div class="h-4 w-1/2 bg-slate-300 rounded"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="h-24 bg-slate-300 rounded-xl"></div>
                <div class="h-24 bg-slate-300 rounded-xl"></div>
            </div>
        </div>
        <!-- Dim Overlay -->
        <div class="absolute inset-0 bg-slate-900/40 z-10"></div>
        <!-- Bottom Sheet (Fixed  Height) -->
        <div
            class="absolute bottom-0 left-0 right-0 h-96 bg-white dark:bg-background-dark rounded-t-xl z-20 flex flex-col shadow-2xl border-t border-primary/10">


            <!-- Tabs/Chips -->
            <div class="flex gap-2 px-4 py-2 overflow-x-auto no-scrollbar shrink-0">
                <div
                    class="flex h-8 shrink-0 items-center justify-center gap-x-1.5 rounded-full bg-primary px-3 shadow-sm shadow-primary/30">
                    <span class="material-symbols-outlined text-[16px] text-white">info</span>
                    <p class="text-white text-xs font-semibold">Details</p>
                </div>
                <a href="3bottom card drink.html"
                    class="flex h-8 shrink-0 items-center justify-center gap-x-1.5 rounded-full bg-slate-100 dark:bg-slate-800 px-3">
                    <span
                        class="material-symbols-outlined text-[16px] text-slate-600 dark:text-slate-400">local_bar</span>
                    <p class="text-slate-600 dark:text-slate-400 text-xs font-semibold">Drinks</p>
                </a>
                <a href="2bottom card extra.html"
                    class="flex h-8 shrink-0 items-center justify-center gap-x-1.5 rounded-full bg-slate-100 dark:bg-slate-800 px-3">
                    <span
                        class="material-symbols-outlined text-[16px] text-slate-600 dark:text-slate-400">add_circle</span>
                    <p class="text-slate-600 dark:text-slate-400 text-xs font-semibold">Extras</p>
                </a>
                <a href="4bottom card delivery.html"
                    class="flex h-8 shrink-0 items-center justify-center gap-x-1.5 rounded-full bg-slate-100 dark:bg-slate-800 px-3">
                    <span
                        class="material-symbols-outlined text-[16px] text-slate-600 dark:text-slate-400">local_shipping</span>
                    <p class="text-slate-600 dark:text-slate-400 text-xs font-semibold">Delivery</p>
                </a>
            </div>
            <div class="flex-1 overflow-y-auto px-4 mt-1 flex justify-center flex-col">
                <div class="flex items-start gap-4 py-2">
                    <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-16 w-16 shrink-0 shadow-md border-2 border-white dark:border-zinc-800"
                        data-alt="Small gourmet pepperoni pizza"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBrANE8adrSbFLC4N82hBpGBvDZQ5R4Kzdzz3diVbcCSVNrT6Mfx4_NS_LH4tpyaJfUsRUoCTW9eoPgUE1f7wWgJBzI05pdsFchyrJNl4lH6QNIYsNtqmUm3y4n1zvNLp64_tk6mklcTRWDtaRdTVWOmfHxIhP94W6bdTTOr4cdAJxkcrmfkfgtrZhRgSD31B96RlW_BsVahOws4xhQPPKExGwGoAXO4UU4vACQCNjz1lLrlYPcdeD3k-03w0xN44aPT-gA0_vltEDv");'>
                    </div>
                    <div class="flex flex-col justify-center">
                        <p class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Gourmet Pizza</p>
                        <p class="text-slate-500 dark:text-zinc-400 text-sm font-normal leading-snug line-clamp-3">
                            Hand-tossed crust with premium cured pepperoni and aged mozzarella pimenter a la sauce jaune
                            .</p>
                    </div>
                </div>

                <!-- Price Chips -->
                <div class="flex gap-2 py-3 border-t border-slate-100 dark:border-zinc-800 my-1">
                    <button
                        class="flex-1 flex flex-col items-center justify-center p-2 rounded-xl border-2 border-primary bg-primary/5">
                        <span class="text-[10px] uppercase font-bold text-primary">Small</span>
                        <span class="text-sm font-bold text-slate-900 dark:text-slate-100">$10.99</span>
                    </button>
                    <button
                        class="flex-1 flex flex-col items-center justify-center p-2 rounded-xl border border-slate-200 dark:border-zinc-700">
                        <span class="text-[10px] uppercase font-bold text-slate-400">Med</span>
                        <span class="text-sm font-bold text-slate-900 dark:text-slate-100">$14.99</span>
                    </button>
                    <button
                        class="flex-1 flex flex-col items-center justify-center p-2 rounded-xl border border-slate-200 dark:border-zinc-700">
                        <span class="text-[10px] uppercase font-bold text-slate-400">Large</span>
                        <span class="text-sm font-bold text-slate-900 dark:text-slate-100">$18.99</span>
                    </button>
                </div>

                <div class="grid grid-cols-4 gap-4 mb-3">
                    <button
                        class="bg-white dark:bg-slate-800 rounded-2xl  flex flex-col justify-between items-center  border-primary shadow-[var(--ios-shadow)] transition-all">
                        <span class="material-symbols-outlined text-primary text-xl">location_on</span>
                        <div class="text-center">
                            <p class="text-[13px] font-semibold text-slate-800 dark:text-slate-100 leading-tight">
                                Location</p>
                            <p class="text-[9px] font-medium text-primary mt-1">123 Way, 4B</p>
                        </div>
                    </button>
                    <button
                        class="bg-white dark:bg-slate-800 rounded-2xl  flex flex-col justify-between items-center  border-slate-100 dark:border-slate-700 shadow-[var(--ios-shadow)] active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-primary text-xl">schedule</span>
                        <div class="text-center">
                            <p class="text-[13px] font-semibold text-slate-800 dark:text-slate-100 leading-tight">
                                Period
                            </p>
                            <p class="text-[9px] font-medium  mt-1 text-primary">11h00 - 11h30</p>
                        </div>
                    </button>
                    <button
                        class="bg-white dark:bg-slate-800 rounded-2xl  flex flex-col justify-between items-center  border-slate-100 dark:border-slate-700 shadow-[var(--ios-shadow)] active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-primary text-xl">call</span>
                        <div class="text-center">
                            <p class="text-[13px] font-semibold text-slate-800 dark:text-slate-100 leading-tight">
                                contact
                            </p>
                            <p class="text-[9px] font-medium mt-1 text-primary">696080087</p>
                        </div>
                    </button><button
                        class="bg-white dark:bg-slate-800 rounded-2xl  flex flex-col justify-between items-center   border-slate-100 dark:border-slate-700 shadow-[var(--ios-shadow)] active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-slate-400 text-xl">sticky_note_2</span>
                        <div class="text-center">
                            <p class="text-[13px] font-semibold text-slate-800 dark:text-slate-100 leading-tight">
                                Notes
                            </p>
                            <p class="text-[9px] font-medium mt-1 text-primary">smal prt</p>
                        </div>
                    </button>
                    <!-- <button
                                        class="bg-white dark:bg-slate-800 rounded-2xl py-2 flex flex-col justify-between items-start  border-slate-100 dark:border-slate-700 shadow-[var(--ios-shadow)] active:scale-95 transition-transform">
                                        <span class="material-symbols-outlined text-slate-400 text-xl">mic</span>
                                        <div class="text-left mt-2">
                                            <p class="text-[13px] font-semibold text-slate-800 dark:text-slate-100 leading-tight">Voice
                                            </p>
                                            <p class="text-[9px] font-medium text-slate-400 mt-1 text-primary">No rush</p>
                                        </div>
                                    </button> -->
                </div>
            </div>
            <!-- Sticky Bottom Action Bar -->

            <div
                class="p-4 bg-white dark:bg-background-dark border-t border-slate-100 dark:border-slate-800 shrink-0 flex items-center gap-1">
                <div class=" flex flex-1 items-center  rounded-full p-1 h-12 justify-center">

                    <span class="  font-bold text-slate-900 dark:text-white">XAF <br> 1500 </span>

                </div>

                <div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-full p-1 h-12">
                    <button
                        class="w-10 h-10 flex items-center justify-center rounded-full text-slate-900 dark:text-white">
                        <span class="material-symbols-outlined text-lg">remove</span>
                    </button>
                    <span class="w-8 text-center font-bold text-slate-900 dark:text-white">1</span>
                    <button
                        class="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-700 rounded-full shadow-sm text-slate-900 dark:text-white">
                        <span class="material-symbols-outlined text-lg">add</span>
                    </button>
                </div>


                <button
                    class=" text-xs px-1 flex-[1.5] h-12 bg-primary text-white rounded-3xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
                    <!-- <span class="material-symbols-outlined text-lg">shopping_bag</span> -->
                    add To Cart
                </button>
                <button
                    class=" text-xs flex-[1.2] h-12 bg-primary text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-base">shopping_cart</span>
                    buy
                </button>



            </div>

        </div>
    </div>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body>

</html>
