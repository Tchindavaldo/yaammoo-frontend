<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Delivery Type - Clean White Background</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec4913",
                        "background-light": "#ffffff",
                        "background-dark": "#1a120f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        :root {
            --ios-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative mx-auto max-w-[430px] h-screen overflow-hidden bg-white dark:bg-background-dark shadow-2xl flex flex-col">
<div class="absolute inset-0 z-0 bg-white dark:bg-background-dark">
</div>
<div class="mt-auto relative z-20 bg-white dark:bg-background-dark rounded-t-[2.5rem] shadow-[0_-10px_50px_rgba(0,0,0,0.08)] flex flex-col min-h-[45vh]">
<div class="flex justify-center pt-4 pb-2">
<div class="w-10 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
<div class="flex gap-2 px-6 py-4 overflow-x-auto hide-scrollbar">
<button class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-semibold text-[13px] whitespace-nowrap">
                    Details
                </button>
<button class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-semibold text-[13px] whitespace-nowrap">
                    Drinks
                </button>
<button class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-semibold text-[13px] whitespace-nowrap">
                    Extras
                </button>
<button class="px-5 py-2 rounded-full bg-primary text-white font-semibold text-[13px] whitespace-nowrap shadow-md shadow-primary/20">
                    Delivery
                </button>
</div>
<div class="px-6 py-2 overflow-y-auto hide-scrollbar">
<div class="flex items-center justify-between mb-3">
<h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Select Type</h3>
<button class="text-primary text-[11px] font-bold">Done</button>
</div>
<div class="grid grid-cols-3 gap-3">
<button class="bg-white dark:bg-slate-800 rounded-2xl p-3 flex flex-col justify-between items-start border-2 border-primary shadow-[var(--ios-shadow)] transition-all">
<span class="material-symbols-outlined text-primary text-xl">bolt</span>
<div class="text-left mt-2">
<p class="text-[13px] font-semibold text-slate-800 dark:text-slate-100 leading-tight">Express</p>
<p class="text-[9px] font-medium text-primary mt-1">15-25 min</p>
</div>
</button>
<button class="bg-white dark:bg-slate-800 rounded-2xl p-3 flex flex-col justify-between items-start border border-slate-100 dark:border-slate-700 shadow-[var(--ios-shadow)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-slate-400 text-xl">schedule</span>
<div class="text-left mt-2">
<p class="text-[13px] font-semibold text-slate-800 dark:text-slate-100 leading-tight">Heure</p>
<p class="text-[9px] font-medium text-slate-400 mt-1">Scheduled</p>
</div>
</button>
<button class="bg-white dark:bg-slate-800 rounded-2xl p-3 flex flex-col justify-between items-start border border-slate-100 dark:border-slate-700 shadow-[var(--ios-shadow)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-slate-400 text-xl">do_not_disturb_on</span>
<div class="text-left mt-2">
<p class="text-[13px] font-semibold text-slate-800 dark:text-slate-100 leading-tight">Aucun</p>
<p class="text-[9px] font-medium text-slate-400 mt-1">No rush</p>
</div>
</button>
</div>
<div class="mt-4 px-2">
<div class="flex items-center gap-2 text-primary font-medium text-xs">
<span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
                        Arrives in 15-25 min
                    </div>
</div>
</div>
<div class="mt-auto p-6 bg-white/90 dark:bg-background-dark/95 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800/50 flex items-center gap-4 pb-10">
<div class="flex items-center bg-slate-50 dark:bg-slate-800 rounded-full p-1 border border-slate-100 dark:border-slate-700">
<button class="w-10 h-10 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<span class="px-3 font-bold text-lg min-w-[24px] text-center">1</span>
<button class="w-10 h-10 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
<button class="flex-1 bg-primary text-white h-14 rounded-full font-bold flex items-center justify-center gap-2 shadow-xl shadow-primary/25 active:scale-[0.98] transition-transform">
<span>Add to Cart</span>
<span class="opacity-40">•</span>
<span>$24.50</span>
</button>
</div>
</div>
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-900/10 dark:bg-white/10 rounded-full z-30"></div>
</div>

</body></html>
