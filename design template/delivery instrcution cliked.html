<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec4913",
                        "background-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "ui": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-slate-50 font-display flex items-center justify-center min-h-screen">
    <div
        class="relative h-[844px] w-[390px] overflow-hidden rounded-[3.5rem] bg-white shadow-2xl ring-8 ring-slate-900">
        <div class="absolute top-0 flex w-full items-center justify-between px-8 pt-12 pb-4 z-20">
            <p class="text-slate-900 text-[15px] font-semibold">9:41</p>
            <div class="flex items-center gap-1.5 text-slate-900">
                <span class="material-symbols-outlined text-[20px] font-medium">signal_cellular_4_bar</span>
                <span class="material-symbols-outlined text-[20px] font-medium">wifi</span>
                <span class="material-symbols-outlined text-[20px] rotate-90 font-medium">battery_full</span>
            </div>
        </div>
        <div class="absolute inset-0 z-0 bg-white flex flex-col items-center justify-start pt-40 p-12">
            <div class="w-24 h-24 rounded-full bg-slate-50 flex items-center justify-center mb-6">
                <span class="material-symbols-outlined text-slate-200 text-5xl font-light">local_shipping</span>
            </div>
            <h1 class="text-slate-300 text-sm font-medium tracking-[0.2em] uppercase">Delivery Details</h1>
        </div>
        <div class="absolute bottom-0 left-0 w-full z-30">
            <div
                class="flex flex-col items-stretch rounded-t-[2.5rem] bg-white pt-2 shadow-[0_-20px_60px_rgba(0,0,0,0.08)] border-t border-slate-100/50 min-h-[480px]">
                <div class="flex h-1.5 w-full items-center justify-center py-4">
                    <div class="h-1.25 w-10 rounded-full bg-slate-100"></div>
                </div>
                <div class="flex px-8 justify-between border-b border-slate-50 shrink-0">
                    <a class="relative flex flex-col items-center justify-center pb-4 pt-2" href="#">
                        <p class="text-slate-400 text-[10px] font-semibold uppercase tracking-[0.12em] font-ui">Standard
                        </p>
                    </a>
                    <a class="relative flex flex-col items-center justify-center pb-4 pt-2" href="#">
                        <p class="text-slate-400 text-[10px] font-semibold uppercase tracking-[0.12em] font-ui">Express
                        </p>
                    </a>
                    <a class="relative flex flex-col items-center justify-center pb-4 pt-2" href="#">
                        <p class="text-primary text-[10px] font-bold uppercase tracking-[0.12em] font-ui">Premium</p>
                        <div class="absolute bottom-0 h-[2.5px] w-6 bg-primary rounded-full"></div>
                    </a>
                    <a class="relative flex flex-col items-center justify-center pb-4 pt-2" href="#">
                        <p class="text-slate-400 text-[10px] font-semibold uppercase tracking-[0.12em] font-ui">Schedule
                        </p>
                    </a>
                </div>
                <div class="flex-1 px-8 pt-6 pb-4">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-slate-400 text-xl">sticky_note_2</span>
                            <h3 class="text-slate-900 text-sm font-bold">Delivery Instructions</h3>
                        </div>
                        <span
                            class="text-[10px] font-bold text-slate-300 uppercase tracking-widest font-ui">Optional</span>
                    </div>
                    <div class="relative group">
                        <textarea
                            class="w-full h-40 bg-slate-50 border-none rounded-2xl p-5 text-slate-700 text-[15px] leading-relaxed placeholder:text-slate-300 focus:ring-1 focus:ring-primary/20 transition-all resize-none"
                            placeholder="E.g. Ring the bell, leave at the front gate or call upon arrival..."></textarea>
                        <button
                            class="absolute bottom-4 right-4 h-10 w-10 bg-primary text-white rounded-full shadow-lg shadow-primary/20 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform">
                            <span class="material-symbols-outlined text-[22px]">check</span>
                        </button>
                    </div>
                </div>
                <div class="flex justify-between px-8 pt-4 pb-12 shrink-0">
                    <div class="flex flex-col items-center gap-2.5 flex-1 opacity-40">
                        <div
                            class="flex h-[58px] w-[58px] items-center justify-center rounded-full border border-slate-100 bg-white text-slate-600">
                            <span class="material-symbols-outlined text-[24px] font-light">satellite_alt</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-center gap-2.5 flex-1 opacity-40">
                        <div
                            class="flex h-[58px] w-[58px] items-center justify-center rounded-full border border-slate-100 bg-white text-slate-600">
                            <span class="material-symbols-outlined text-[24px] font-light">call</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-center gap-2.5 flex-1">
                        <div
                            class="flex h-[58px] w-[58px] items-center justify-center rounded-full border-2 border-primary bg-white text-primary shadow-sm">
                            <span class="material-symbols-outlined text-[24px] font-medium">sticky_note_2</span>
                        </div>
                        <div class="w-1 h-1 rounded-full bg-primary mt-1"></div>
                    </div>
                    <div class="flex flex-col items-center gap-2.5 flex-1 opacity-40">
                        <div
                            class="flex h-[58px] w-[58px] items-center justify-center rounded-full border border-slate-100 bg-white text-slate-600">
                            <span class="material-symbols-outlined text-[24px] font-light">mic</span>
                        </div>
                    </div>
                </div>
                <div class="h-5 w-full flex justify-center items-end pb-3 shrink-0">
                    <div class="h-1.25 w-32 rounded-full bg-slate-200/60"></div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
