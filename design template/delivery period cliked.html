<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Delivery Time - Clean White Background</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec4913",
                        "background-light": "#ffffff",
                        "background-dark": "#1a120f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        :root {
            --ios-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-white dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
    <div class="relative mx-auto max-w-[430px] h-screen overflow-hidden bg-white shadow-2xl flex flex-col">
        <div class="absolute inset-0 z-0 bg-white dark:bg-background-dark"></div>
        <div
            class="mt-auto relative z-20 bg-white dark:bg-background-dark rounded-t-[2.5rem] shadow-[0_-10px_50px_rgba(0,0,0,0.04)] flex flex-col min-h-[60vh]">
            <div class="flex justify-center pt-4 pb-1">
                <div class="w-10 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
            </div>
            <div class="flex gap-2 px-6 py-3 overflow-x-auto hide-scrollbar">
                <button
                    class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-semibold text-[13px] whitespace-nowrap">
                    Details
                </button>
                <button
                    class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-semibold text-[13px] whitespace-nowrap">
                    Drinks
                </button>
                <button
                    class="px-5 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-semibold text-[13px] whitespace-nowrap">
                    Extras
                </button>
                <button
                    class="px-5 py-2 rounded-full bg-primary text-white font-semibold text-[13px] whitespace-nowrap shadow-md shadow-primary/20">
                    Delivery
                </button>
            </div>
            <div class="px-6 pb-2">
                <div class="flex items-center gap-2 mb-4 text-slate-400">
                    <span class="material-symbols-outlined text-[18px]">schedule</span>
                    <span class="text-[13px] font-semibold">Select delivery time</span>
                </div>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <button
                        class="h-[54px] rounded-2xl bg-primary/5 border border-primary/20 flex flex-col items-center justify-center active:scale-95 transition-transform">
                        <span class="text-[13px] font-bold text-primary">Now</span>
                    </button>
                    <button
                        class="h-[54px] rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center active:scale-95 transition-transform">
                        <span class="text-[13px] font-bold text-slate-800 dark:text-slate-200">+30m</span>
                    </button>
                    <button
                        class="h-[54px] rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center active:scale-95 transition-transform">
                        <span class="text-[13px] font-bold text-slate-800 dark:text-slate-200">+1h</span>
                    </button>
                    <button
                        class="h-[54px] rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center active:scale-95 transition-transform">
                        <span class="text-[13px] font-bold text-slate-800 dark:text-slate-200">+1.5h</span>
                    </button>
                    <button
                        class="h-[54px] rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center active:scale-95 transition-transform">
                        <span class="text-[13px] font-bold text-slate-800 dark:text-slate-200">+2h</span>
                    </button>
                    <button
                        class="h-[54px] rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center active:scale-95 transition-transform">
                        <span class="text-[13px] font-bold text-slate-800 dark:text-slate-200">+3h</span>
                    </button>
                </div>
                <button
                    class="w-full h-12 bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700 rounded-2xl flex items-center justify-center gap-2 active:scale-[0.99] transition-transform">
                    <span class="material-symbols-outlined text-[18px] text-slate-400">calendar_today</span>
                    <span class="text-[13px] font-bold text-slate-800 dark:text-slate-200">Custom time</span>
                </button>
            </div>
            <div
                class="mt-auto p-6 bg-white dark:bg-background-dark border-t border-slate-100 dark:border-slate-800/50 flex items-center gap-4 pb-10">
                <div
                    class="flex items-center bg-slate-50 dark:bg-slate-800 rounded-full p-1 border border-slate-100 dark:border-slate-700">
                    <button class="w-10 h-10 flex items-center justify-center text-slate-400">
                        <span class="material-symbols-outlined text-xl">remove</span>
                    </button>
                    <span class="px-3 font-bold text-lg min-w-[24px] text-center">1</span>
                    <button class="w-10 h-10 flex items-center justify-center text-slate-400">
                        <span class="material-symbols-outlined text-xl">add</span>
                    </button>
                </div>
                <button
                    class="flex-1 bg-primary text-white h-14 rounded-full font-bold flex items-center justify-center gap-2 shadow-xl shadow-primary/25 active:scale-[0.98] transition-transform">
                    <span>Add to Cart</span>
                    <span class="opacity-40">•</span>
                    <span>$24.50</span>
                </button>
            </div>
        </div>
        <div
            class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-900/10 dark:bg-white/10 rounded-full z-30">
        </div>
    </div>

</body>

</html>
