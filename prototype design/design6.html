<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promo Banner – 50% Off</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: #f0ece6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .banner {
            background: url('banner\ shawamar.png') center/cover no-repeat;
            border-radius: 24px;
            padding: 32px 24px 20px;
            position: relative;
            overflow: hidden;
            min-height: 300px;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .blob1 {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            top: -60px;
            left: -40px;
        }

        .blob2 {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            bottom: -50px;
            left: 100px;
        }

        .top-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
            z-index: 2;
            position: relative;
        }

        .top-line span {
            color: white;
            font-size: 15px;
        }

        .code-badge {
            background: white;
            color: #e8440a;
            font-size: 13px;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 20px;
            letter-spacing: .5px;
        }

        .hurry {
            color: white;
            font-size: 15px;
            margin-bottom: 16px;
            z-index: 2;
            position: relative;
        }

        .big-title {
            font-size: 36px;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            max-width: 280px;
            z-index: 2;
            position: relative;
        }

        .spacer {
            height: 40px;
            flex: 1;
        }

        .order-btn {
            position: absolute;
            bottom: 20px;
            right: 16px;
            background: #111;
            color: #f5c842;
            font-size: 17px;
            font-weight: 800;
            padding: 14px 30px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            letter-spacing: .2px;
            z-index: 3;
            transition: transform .15s;
        }

        .order-btn:hover {
            transform: scale(1.03);
        }

        .order-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>
    <div class="banner">
        <div class="blob1"></div>
        <div class="blob2"></div>

        <div class="top-line">
            <span>Use code</span>
            <span class="code-badge">FIRST50</span>
            <span>at checkout.</span>
        </div>
        <div class="hurry">Hurry, offer ends soon!</div>
        <div class="big-title">Get 50% Off<br>Your First Order!</div>
        <div class="spacer"></div>
        <button class="order-btn">Order Now</button>
    </div>
</body>

</html>
